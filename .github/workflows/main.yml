name: Windows 10 RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-2022   # Windows 10 virtual yoxdur, amma Windows Server 2022 əsaslı, RDP ilə eyni qaydada işləyir
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: |
          choco install tailscale -y

      - name: Start Tailscale
        run: |
          net start TailscaleService
          tailscale up --authkey=%TAILSCALE_AUTH_KEY% --hostname windows-runner

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set runner password
        run: |
          net user runner 123456 /add
          net localgroup administrators runner /add

      - name: Show RDP connection info
        run: |
          $ip = tailscale ip -4
          Write-Host "Connect via RDP:"
          Write-Host "IP: $ip"
          Write-Host "Username: runner"
          Write-Host "Password: 123456"

      - name: Keep Alive
        run: |
          Write-Host "Runner active. Keep alive loop..."
          while ($true) { Start-Sleep -Seconds 30 }
