name: Ubuntu XFCE4 RDP (Stable)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: ubuntu-latest

    steps:
      - name: Update system
        run: sudo apt update

      - name: Install desktop + RDP
        run: |
          sudo apt install -y xfce4 xfce4-goodies xrdp dbus-x11 sudo

      - name: Fix XFCE session (NO BLACK SCREEN)
        run: |
          echo "startxfce4" > ~/.xsession
          chmod +x ~/.xsession

      - name: Configure XRDP properly
        run: |
          sudo adduser xrdp ssl-cert
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Set password
        run: |
          echo "runner:123456" | sudo chpasswd

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale (FIXED)
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-dns=false

      - name: Show connection info
        run: |
          echo "=============================="
          echo "RDP READY"
          echo "IP:"
          tailscale ip -4
          echo "PORT: 3389"
          echo "USER: runner"
          echo "PASS: 123456"
          echo "=============================="

      - name: Keep alive
        run: sleep 21600
