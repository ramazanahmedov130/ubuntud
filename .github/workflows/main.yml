name: Ubuntu XFCE4 RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: ubuntu-latest

    steps:
      - name: Update system
        run: sudo apt update

      - name: Install XFCE4 + RDP
        run: |
          sudo apt install -y xfce4 xfce4-goodies xrdp dbus-x11

      - name: Configure XFCE for RDP
        run: |
          echo xfce4-session > ~/.xsession

      - name: Start XRDP
        run: |
          sudo systemctl enable xrdp
          sudo systemctl start xrdp

      - name: Set user password
        run: |
          echo "runner:123456" | sudo chpasswd

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale
        run: |
          sudo tailscale up --authkey ${{ secrets.TS_AUTHKEY }} --hostname github-rdp

      - name: Show connection info
        run: |
          echo "Tailscale IP:"
          tailscale ip -4
          echo "RDP Port: 3389"
          echo "Username: runner"
          echo "Password: 123456"

      - name: Keep alive
        run: |
          sleep 21600
