name: Windows 10 RDP via Tailscale (Final Working Version)

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        shell: powershell
        run: |
          choco install tailscale -y

          # Chocolatey PATH update for current session
          $tailscaleFolder = "$env:ProgramFiles\Tailscale IPN"
          if (-not ($env:PATH -split ";" | Where-Object { $_ -eq $tailscaleFolder })) {
              $env:PATH += ";$tailscaleFolder"
          }
          Write-Host "Updated PATH: $env:PATH"

      - name: Start Tailscale
        shell: powershell
        run: |
          # Start Tailscale service
          if (-not (Get-Service -Name Tailscale -ErrorAction SilentlyContinue)) {
              throw "Tailscale service not found"
          }
          Start-Service Tailscale

          # Bring Tailscale up
          tailscale up --authkey=$env:TAILSCALE_AUTH_KEY --hostname windows-runner

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\' -Name "fDenyTSConnections" -Value 0
          Get-NetFirewallRule -DisplayGroup "Remote Desktop" | Set-NetFirewallRule -Enabled True

      - name: Ensure runner user
        shell: powershell
        run: |
          if (-not (Get-LocalUser -Name "runner" -ErrorAction SilentlyContinue)) {
              net user runner 123456 /add
              net localgroup administrators runner /add
          }

      - name: Show RDP connection info
        shell: powershell
        run: |
          $ip = tailscale ip -4
          Write-Host "`n==== RDP Connection Info ===="
          Write-Host "IP: $ip"
          Write-Host "Username: runner"
          Write-Host "Password: 123456"
          Write-Host "==============================`n"

      - name: Minimal Keep Alive (Low CPU)
        shell: powershell
        run: |
          Write-Host "Runner active. Minimal CPU keep-alive..."
          while ($true) {
              tailscale status > $null
              Start-Sleep -Seconds 60
          }
