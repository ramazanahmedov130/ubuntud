name: Fast Ubuntu RDP Setup with Xfce and Tailscale

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'RDP User Username'
        required: true
        default: 'RDP'
      password:
        description: 'RDP User Password'
        required: true
        default: 'password'

jobs:
  setup-ubuntu-rdp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install XRDP and Xfce
        run: |
          sudo apt update -y
          sudo DEBIAN_FRONTEND=noninteractive apt install -y xrdp xfce4 xfce4-goodies dbus-x11

          # xrdp servisini başlat
          sudo systemctl enable xrdp
          sudo systemctl start xrdp

      - name: Install and Configure Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }} --hostname=github-rdp || true

      - name: Create RDP User
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          PASSWORD="${{ github.event.inputs.password }}"

          sudo useradd -m $USERNAME -s /bin/bash
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME

      - name: Configure Xfce Session (FIX)
        run: |
          USERNAME="${{ github.event.inputs.username }}"

          # Kullanıcı için Xfce session ayarı
          sudo -u $USERNAME bash -c 'echo "startxfce4" > ~/.xsession'

          # xrdp için global ayar
          echo "startxfce4" | sudo tee /etc/skel/.xsession
          
          # xrdp startwm.sh fix
          sudo sed -i 's/^test -x/#test -x/g' /etc/xrdp/startwm.sh
          sudo sed -i 's/^exec/#exec/g' /etc/xrdp/startwm.sh
          echo "startxfce4" | sudo tee -a /etc/xrdp/startwm.sh

          # xrdp restart
          sudo systemctl restart xrdp

      - name: Open Firewall Port
        run: |
          sudo ufw allow 3389/tcp || true

      - name: Get Public IP
        run: |
          IP=$(curl -s ifconfig.me)
          echo "IP: $IP"
          echo "RDP IP: $IP" >> $GITHUB_STEP_SUMMARY

      - name: Keep Session Alive (6 Hours)
        run: |
          echo "RDP aktif (6 saat)"
          sleep 21600

      - name: Shutdown
        run: |
          sudo systemctl stop xrdp
          echo "RDP kapatıldı"
