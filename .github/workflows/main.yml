name: Fast Ubuntu RDP Setup with Xfce and Tailscale

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'RDP User Username'
        required: true
        default: 'RDP'
      password:
        description: 'RDP User Password'
        required: true
        default: 'password'

jobs:
  setup-ubuntu-rdp:
    runs-on: ubuntu-latest  # Ubuntu'nun en son sürümünde çalışacak

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Repo içeriğini çekiyoruz

      - name: Install XRDP and Xfce only
        run: |
          sudo apt update -y  # Paket listelerini hızlıca güncelle
          sudo apt install -y xrdp xfce4 curl ufw  # Sadece gerekli paketler

      - name: Install and Configure Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh  # Tailscale kurulumunu hızlı yapıyoruz
          sudo tailscale up  # Tailscale'i başlatıyoruz

      - name: Set up RDP User (Dynamic Username)
        run: |
          sudo useradd -m ${{ github.event.inputs.username }} -s /bin/bash  # Kullanıcı adı parametre ile dinamik olacak
          echo "${{ github.event.inputs.username }}:${{ github.event.inputs.password }}" | sudo chpasswd  # Dinamik kullanıcı şifresi

      - name: Configure Xfce for RDP
        run: |
          # Xfce'yi RDP için yapılandırıyoruz
          echo "startxfce4" > ~/.xsession

      - name: Open RDP Port (3389) in Firewall
        run: |
          sudo ufw allow 3389/tcp  # RDP bağlantısı için gerekli olan portu açıyoruz

      - name: Get Public IP Address
        id: ip
        run: |
          # Sunucunun public IP adresini alıyoruz
          IP_ADDRESS=$(curl -s http://checkip.amazonaws.com)
          echo "Public IP Address: $IP_ADDRESS"
          echo "ip=$IP_ADDRESS" >> $GITHUB_ENV  # IP'yi environment variable olarak ayarlıyoruz

      - name: Wait for 6 hours
        run: |
          echo "RDP session will last for 6 hours."
          sleep 21600  # 6 saatlik bekleme (6 * 60 * 60 = 21600 saniye)

      - name: Final RDP Connection Info
        run: |
          echo "Your RDP session is active for 6 hours."
          echo "Connect using Tailscale VPN at IP: ${{ env.ip }} with username: ${{ github.event.inputs.username }}"

      - name: Shutdown RDP and Cleanup
        run: |
          # 6 saat sonra RDP'yi sonlandırıp sistemi kapatıyoruz
          sudo systemctl stop xrdp  # xrdp'yi durduruyoruz
          echo "RDP session has been closed."
