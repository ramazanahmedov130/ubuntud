name: Windows 10 RDP via Tailscale (Stable & Low CPU)

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        shell: powershell
        run: |
          choco install tailscale -y
          # Tailscale quraşdırıldığı path
          $tailscalePath = "C:\Program Files\Tailscale IPN\tailscale.exe"
          if (-not (Test-Path $tailscalePath)) { throw "Tailscale not found at $tailscalePath" }
          Write-Host "Tailscale installed at $tailscalePath"

      - name: Start Tailscale
        shell: powershell
        run: |
          $tailscalePath = "C:\Program Files\Tailscale IPN\tailscale.exe"
          Start-Service Tailscale
          & $tailscalePath up --authkey=$env:TAILSCALE_AUTH_KEY --hostname windows-runner

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\' -Name "fDenyTSConnections" -Value 0
          Get-NetFirewallRule -DisplayGroup "Remote Desktop" | Set-NetFirewallRule -Enabled True

      - name: Ensure runner user
        shell: powershell
        run: |
          if (-not (Get-LocalUser -Name "runner" -ErrorAction SilentlyContinue)) {
              net user runner 123456 /add
              net localgroup administrators runner /add
          }

      - name: Show RDP connection info
        shell: powershell
        run: |
          $tailscalePath = "C:\Program Files\Tailscale IPN\tailscale.exe"
          $ip = & $tailscalePath ip -4
          Write-Host "`n==== RDP Connection Info ===="
          Write-Host "IP: $ip"
          Write-Host "Username: runner"
          Write-Host "Password: 123456"
          Write-Host "==============================`n"

      - name: Minimal Keep Alive (Low CPU)
        shell: powershell
        run: |
          $tailscalePath = "C:\Program Files\Tailscale IPN\tailscale.exe"
          Write-Host "Runner active. Minimal CPU keep-alive..."
          while ($true) {
              & $tailscalePath status > $null
              Start-Sleep -Seconds 60
          }
